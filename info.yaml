# Tiny Tapeout project information
project:
  title:        "4-bit Carry Save Adder"
  author:       "Arunkumar K"
  discord:      ""
  description:  "Adds three 4-bit numbers using a Carry Save Adder architecture"
  language:     "Verilog"
  clock_hz:     0

  tiles: "1x1"

  top_module:  "tt_um_arunkumar_csa"

  source_files:
    - "tt_um_arunkumar_csa.v"
    - "full_adder.v"

pinout:
  # Inputs
  ui[0]: "A[0]"
  ui[1]: "A[1]"
  ui[2]: "A[2]"
  ui[3]: "A[3]"
  ui[4]: "B[0]"
  ui[5]: "B[1]"
  ui[6]: "B[2]"
  ui[7]: "B[3]"

  # Outputs
  uo[0]: "SUM[0]"
  uo[1]: "SUM[1]"
  uo[2]: "SUM[2]"
  uo[3]: "SUM[3]"
  uo[4]: "SUM[4]"
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "C[0]"
  uio[1]: "C[1]"
  uio[2]: "C[2]"
  uio[3]: "C[3]"
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
